name: xue_hua_pinyin
description: "High-performance Flutter pinyin plugin powered by Rust. Converts Chinese to pinyin (heteronym, multiple tone styles) and extracts index letters for contact lists (mixed Chinese/English, configurable digit/punctuation fallback)"
version: 1.1.0
homepage: https://github.com/Matkurban/xue_hua_pinyin
repository: https://github.com/Matkurban/xue_hua_pinyin
issue_tracker: https://github.com/Matkurban/xue_hua_pinyin/issues
documentation: https://github.com/Matkurban/xue_hua_pinyin/blob/main/README.md
topics:
  - pinyin

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true